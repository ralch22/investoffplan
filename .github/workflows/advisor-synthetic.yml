name: Advisor synthetic check

# Daily proof the Off-Plan Advisor actually ANSWERS — not just responds.
#
# Why this exists: the advisor was broken for ~7 weeks (its Workers AI model
# was deprecated 2026-05-30; found 2026-07-17) with zero signal anywhere. The
# route catches every AI failure into a friendly WhatsApp fallback and returns
# 200, /api/health never touches the advisor (by design — health must stay
# cheap and deterministic for dumb uptime probes), and the e2e suite
# deliberately accepts the fallback because CI has no Workers AI binding. So
# every layer reported success while every user got "the advisor is offline".
# This workflow is the one place that asserts a REAL answer against the REAL
# model in production.
#
# Cost: one Workers-AI call per day = 0.33% of the advisor's daily budget
# (ADVISOR_DAILY_CAP=300). The endpoint needs no auth — just a JSON body.
#
# Required GitHub repository secret:
#   - ADVISOR_HEARTBEAT_URL
#       Better Stack heartbeat "IOP advisor daily synthetic" (id 472770,
#       period 24h, grace 6h). Recreate via
#       POST https://uptime.betterstack.com/api/v2/heartbeats.

on:
  schedule:
    # Daily 05:23 UTC — off-peak for the site, an hour after Monday's ingest
    # window so a Monday failure here isn't tangled with ingest noise.
    - cron: "23 5 * * *"
  workflow_dispatch: {}

jobs:
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - name: Ask the advisor a real question
        run: |
          status=$(curl -s -o /tmp/reply.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"How does buying off-plan work?"}],"locale":"en"}' \
            https://investoffplan.com/api/advisor)
          cat /tmp/reply.json
          echo ""
          if [ "$status" != "200" ]; then
            echo "Advisor returned HTTP $status" >&2
            exit 1
          fi
          reply=$(python3 -c "import json; print(json.load(open('/tmp/reply.json')).get('reply',''))")
          if [ -z "$reply" ]; then
            echo "Advisor returned an empty reply" >&2
            exit 1
          fi
          # The two fallback signatures (locale=en). Matching either means the
          # AI path is broken and the route is papering over it with a 200 —
          # the exact failure mode that stayed invisible for 7 weeks.
          case "$reply" in
            *"advisor is offline right now"*)
              echo "FALLBACK DETECTED: advisor is serving the offline fallback" >&2
              exit 1 ;;
            *"reached today's capacity"*)
              # Budget exhaustion at 05:23 UTC means something is burning the
              # daily cap — also worth a page, not a shrug.
              echo "FALLBACK DETECTED: daily budget exhausted at synthetic time" >&2
              exit 1 ;;
          esac
          echo "Advisor answered for real (${#reply} chars)"

      # Second call: prove the A2UI surface is still being composed in prod.
      # Same invisible-failure risk as above, but worse — if the composer breaks
      # or ADVISOR_A2UI gets flipped off, the widget silently falls back to the
      # legacy cards and NOTHING errors. Only this check would notice.
      #
      # Assertion is conditional on purpose: the model doesn't always call
      # search_projects, and a turn with no grounded cards legitimately composes
      # no surface. So we assert the implication "cards => a2ui", which catches a
      # broken composer / disabled flag without flaking on ungrounded turns.
      #
      # Cost: a second Workers-AI call = 2/300 of the daily cap total.
      - name: Verify the A2UI surface is composed
        run: |
          status=$(curl -s -o /tmp/a2ui.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"Show me 2-bed apartments in Dubai Marina"}],"locale":"en","a2uiSupported":true}' \
            https://investoffplan.com/api/advisor)
          cat /tmp/a2ui.json
          echo ""
          if [ "$status" != "200" ]; then
            echo "Advisor returned HTTP $status" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          d = json.load(open("/tmp/a2ui.json"))
          cards, a2ui = d.get("cards") or [], d.get("a2ui") or []
          if not cards:
              print("No grounded cards this turn — nothing to compose; skipping.")
              sys.exit(0)
          if not a2ui:
              print(f"A2UI MISSING: {len(cards)} grounded card(s) but no a2ui payload — "
                    "composer broken or ADVISOR_A2UI disabled.", file=sys.stderr)
              sys.exit(1)
          kinds = [k for m in a2ui for k in m if k != "version"]
          if "createSurface" not in kinds or "updateComponents" not in kinds:
              print(f"A2UI MALFORMED: expected createSurface+updateComponents, got {kinds}", file=sys.stderr)
              sys.exit(1)
          comps = [c for m in a2ui if "updateComponents" in m
                     for c in m["updateComponents"]["components"]]
          if not any(c.get("id") == "root" for c in comps):
              print("A2UI MALFORMED: no root component — the renderer would show nothing.", file=sys.stderr)
              sys.exit(1)
          print(f"A2UI composed: {len(cards)} card(s) -> {len(comps)} component(s)")
          PY

      # Heartbeat pair — same playbook as catalog-ingest.yml: a heartbeat
      # catches BOTH failure modes (the check failed / the check never ran —
      # GitHub disables schedules after 60 days of repo inactivity). /fail is
      # undocumented-but-verified and only buys latency; period+grace is the
      # real guarantee. `|| true` so flaky alerting never fails a green check.
      - name: Report success
        if: success()
        run: curl -fsS -m 20 "${{ secrets.ADVISOR_HEARTBEAT_URL }}" || true

      - name: Report failure
        if: failure()
        run: curl -fsS -m 20 -X POST "${{ secrets.ADVISOR_HEARTBEAT_URL }}/fail" || true

  # ── Deterministic A2UI page surfaces ────────────────────────────────────────
  #
  # The job above proves the CHAT surface. These are the Phase-2 surfaces that
  # live in pages (PDP decision strip, SERP zero-result rescue, investor-match
  # next step). Their risk profile is the opposite of the advisor's: they spend
  # no model budget, so nothing rate-limits or bills them — but they fail just
  # as silently. A broken composer, a bad NEXT_PUBLIC_A2UI_SURFACES value, or a
  # build that dropped the flag all degrade to "the page as it looked before",
  # which is indistinguishable from healthy. Nothing 500s. Nothing alerts.
  #
  # Cost: zero Workers-AI calls — every assertion here is deterministic.
  #
  # No heartbeat of its own on purpose: it shares this workflow's schedule, so
  # the advisor heartbeat above already covers "the check stopped running", and
  # a second Better Stack monitor would only duplicate that signal.
  page-surfaces:
    runs-on: ubuntu-latest
    steps:
      # Cheapest first, and no checkout needed. The PDP strip is composed in the
      # SERVER render, so its protocol JSON is in the HTML flight payload — a
      # plain curl can see it. This one check would catch a composer break or a
      # missing flag site-wide, before we pay for a browser.
      - name: PDP decision strip is composed server-side
        run: |
          set -o pipefail
          url="https://investoffplan.com/projects/105-residences"
          status=$(curl -s -o /tmp/pdp.html -w "%{http_code}" --max-time 45 "$url")
          echo "HTTP $status  ($(wc -c < /tmp/pdp.html) bytes)"
          if [ "$status" != "200" ]; then
            echo "::error::PDP returned HTTP $status" >&2
            exit 1
          fi
          # The section wrapper is server-rendered even when the surface is off,
          # so it is NOT evidence on its own — assert the protocol payload.
          if ! grep -q 'createSurface' /tmp/pdp.html; then
            echo "::error::A2UI MISSING — no createSurface in the PDP payload. The composer is broken, or NEXT_PUBLIC_A2UI_SURFACES excludes 'pdp'." >&2
            exit 1
          fi
          if ! grep -q '\\"id\\":\\"root\\"\|"id":"root"' /tmp/pdp.html; then
            echo "::error::A2UI MALFORMED — createSurface present but no root component; the renderer would show nothing." >&2
            exit 1
          fi
          echo "PDP decision strip composed (createSurface + root present)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The other two surfaces are composed CLIENT-side (the A2UI renderer has
      # no getServerSnapshot, so page surfaces mount with ssr:false) and are
      # therefore invisible to curl. Real browser, real production.
      - name: Client-composed surfaces render in production
        run: npx tsx scripts/prod-surfaces-synthetic.ts https://investoffplan.com
