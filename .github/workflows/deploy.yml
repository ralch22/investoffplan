name: Deploy (production)

# Runs the SAME build + e2e gate as CI, then deploys to the production Worker
# via OpenNext — only if every check passes. This replaces the Cloudflare
# "Workers Builds" git integration (which deployed on push WITHOUT running e2e
# and used the wrong wrangler config). Deploy path matches `npm run deploy:production`.

on:
  push:
    branches: [main]

concurrency:
  # never cancel an in-flight production deploy; queue instead
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate-and-deploy:
    name: build, e2e, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build
        run: npm run build

      - name: Seed local D1 for e2e
        run: |
          npm run db:migrate:local
          npm run db:seed:local

      - name: End-to-end tests
        run: npm run test:e2e

      # --- gate passed: deploy to production ---
      - name: Deploy to production (OpenNext -> Workers)
        # account_id comes from wrangler.production.jsonc; only the API token is secret.
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
