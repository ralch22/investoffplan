name: Catalog ingest

# Required GitHub repository secrets for weekly catalog scrape + production D1 upsert:
#   - ALERTS_DISPATCH_TOKEN
#       Must match the worker secret of the same name (docs/alerts.md). The
#       final step triggers the saved-search alert digests after the ingest.
#   - CLOUDFLARE_API_TOKEN
#       Create a scoped API token in Cloudflare dashboard (My Profile > API Tokens).
#       Permissions needed:
#         - Account > D1:Edit
#         - Account > Workers Scripts:Edit  (required for wrangler getPlatformProxy --remote)
#       Include the target account resource.
#   - CLOUDFLARE_ACCOUNT_ID
#       Value: 4a75e91d6fca8bc58467fb80ce1b9c2e
#       (Emerge Digital — verified 2026-07-15 as the account holding D1
#       investoffplan-catalog e5aa2877-4359-4c28-8499-0c149200c6a4. Matches
#       wrangler.jsonc. Not really a secret; it is committed there too.)
#   - INGEST_HEARTBEAT_URL
#       Better Stack heartbeat "IOP weekly catalog ingest" (id 472431, period
#       7d, grace 12h). The last two steps report this run's outcome to it.
#       Recreate via POST https://uptime.betterstack.com/api/v2/heartbeats.
#
# Both CLOUDFLARE_* secrets were MISSING until 2026-07-15 — run 29230268222
# logged them as empty strings, so the --remote D1 upsert had never once been
# able to authenticate. If the upsert starts failing on auth, check that
# CLOUDFLARE_API_TOKEN still exists before debugging anything else.
#
# Optional GitHub repository variables:
#   - IOP_WHATSAPP  (default contact number injected into catalog rows when PF has none)
#
# The ingest always runs `upsert-catalog-to-d1.ts --remote` (production D1) and
# commits updated data/catalog.json + public/data/ slices on schedule runs.
# Use "Run workflow" with smoke=true for quick validation (no full commit side-effects).

on:
  schedule:
    # Monday 04:00 UTC — weekly PF catalog refresh
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      smoke:
        description: "Smoke test (2 PF pages, 5 brochures)"
        type: boolean
        default: false

concurrency:
  group: catalog-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    env:
      # "Was this a real ingest?" — mirrors the Commit catalog snapshot gate
      # below. A smoke run scrapes 2 of PF's ~76 pages, so it neither commits
      # nor counts as the weekly refresh having happened.
      #
      # Deliberately NOT wired into the commit step itself. The two conditions
      # must agree, but the commit gate gets no refactor from me, however
      # obviously equivalent — if these ever drift the cost here is a mistimed
      # heartbeat ping, and the cost there is the whole catalog.
      REAL_INGEST: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.smoke != 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run catalog ingest pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          IOP_WHATSAPP: ${{ vars.IOP_WHATSAPP }}
        run: |
          ARGS="--remote"
          if [ "${{ github.event.inputs.smoke }}" = "true" ]; then
            ARGS="$ARGS --smoke"
          fi
          npx tsx scripts/catalog-ingest-pipeline.ts $ARGS

      # Never on a smoke run. Smoke scrapes 2 of PF's ~76 pages, so its catalog
      # is a slice of the real one — committing it would delete every project on
      # the pages it never fetched. scrape-pf-catalog.ts also refuses to write
      # at all under --pages; this is the second lock on the same door, because
      # the cost of getting it wrong is the whole catalog.
      - name: Commit catalog snapshot
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.smoke != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json public/data/
          if git diff --staged --quiet; then
            echo "No catalog changes to commit"
            exit 0
          fi
          git commit -m "chore(catalog): weekly PF ingest $(date -u +%Y-%m-%d)"
          git push

      # Saved-search alert digests — runs right after the ingest so
      # first_seen_at rows stamped by this run are picked up while fresh.
      # Loops on {remaining} (the endpoint stops at its 25s time budget).
      # No-ops cleanly (401 is a hard failure; skipped email is not) while
      # RESEND_API_KEY is not configured on the worker.
      - name: Dispatch saved-search alerts
        if: always()
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /tmp/alerts-body -w "%{http_code}" -X POST \
              -H "x-alerts-token: ${{ secrets.ALERTS_DISPATCH_TOKEN }}" \
              https://investoffplan.com/api/alerts/dispatch)
            cat /tmp/alerts-body
            if [ "$status" != "200" ]; then
              echo "Alerts dispatch returned $status" >&2
              exit 1
            fi
            remaining=$(sed -n 's/.*"remaining":\([0-9]*\).*/\1/p' /tmp/alerts-body)
            if [ -z "$remaining" ] || [ "$remaining" = "0" ]; then
              break
            fi
            echo "Continuing dispatch loop — $remaining searches remaining"
          done

      # Liveness for the weekly refresh, reported to a Better Stack heartbeat.
      #
      # This exists because of what happened without it: the 2026-07-13 run —
      # the only run in this workflow's history — failed at two independent
      # steps, the site's catalog stopped refreshing, and nobody found out until
      # someone went looking days later. GitHub does email the owner when a
      # scheduled workflow fails; that is the status quo being replaced, not an
      # alternative to it.
      #
      # A heartbeat is used rather than an on-failure hook because there are two
      # failure modes and only one of them involves a failure:
      #   1. the run failed
      #   2. the run never happened
      # (2) is not hypothetical — GitHub disables scheduled workflows in repos
      # with no activity for 60 days. An on-failure hook is silent in exactly
      # that case, because there is no run to fire it. To Better Stack both look
      # the same: no ping arrived, so the heartbeat lapses and it alerts.
      #
      # Only a real ingest pings. A smoke run that pinged would reset the timer
      # and buy another week of silence for a weekly refresh that never ran —
      # which is the precise failure this step is here to catch.
      - name: Report ingest success
        if: success() && env.REAL_INGEST == 'true'
        run: curl -fsS -m 20 "${{ secrets.INGEST_HEARTBEAT_URL }}" || true

      # /fail flips the heartbeat down in seconds instead of waiting out the 12h
      # grace. It is undocumented — verified by experiment 2026-07-15 against
      # the live heartbeat: ping -> up, POST /fail -> down, ping -> up.
      #
      # Safe to depend on precisely because nothing depends on it: it only buys
      # latency. The period+grace is the actual guarantee. If Better Stack drops
      # /fail, this 404s on a job that has already failed, and the heartbeat
      # still lapses on its own and still alerts — just 12h later instead of
      # instantly. `|| true` keeps a flaky alerting call from being the thing
      # that fails an otherwise-fine run; a ping that silently never lands
      # lapses the heartbeat, which is the safe direction to fail.
      - name: Report ingest failure
        if: failure() && env.REAL_INGEST == 'true'
        run: curl -fsS -m 20 -X POST "${{ secrets.INGEST_HEARTBEAT_URL }}/fail" || true